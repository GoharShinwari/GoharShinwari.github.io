  <!DOCTYPE html>
    <html>
      <head>
        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="game.js"></script>
        <title>DBZ Character Select</title>
          <h1>Who would you like to play as?</h1>
          <div id="character-select">
            <button id="goku-button" onclick="selectCharacter('Goku')">
              <img src="https://cdn.discordapp.com/attachments/1069016535542276208/1069020500497547334/latest.png" alt="Goku">
            </button>
            <button id="vegeta-button" onclick="selectCharacter('Vegeta')">
              <img src="https://cdn.discordapp.com/attachments/1069016535542276208/1069020591413264444/latest.png" alt="Vegeta">
            </button>
          </div>
          <div id="selected-character"></div>
        
          <div id="confirmation-button" style="display:none;">
            <p>Are you sure you want to select this character?</p>
            <button id="yes-button" onclick="startGame()">Yes</button>
            
            <button id="no-button" onclick="cancelSelection()">No</button>
          </div>

          </div> 
      </body>
    </html>
