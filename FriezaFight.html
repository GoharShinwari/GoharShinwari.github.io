<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Frieza Fight</title>
    <link rel="stylesheet" href="FriezaFight.css">
    <script src="FriezaFight.js"></script>
</head>
<body>
    <div class="battle-container">
        <div class="character-container">
            <img src="https://media.discordapp.net/attachments/1067525557824266400/1073412678778884106/image_3.png" alt="SSGoku" id="SSGoku">
            <div class="goku-bars">
                <div class="hp-bar">
                    <div class="bar-label">HP</div>
                    <div class="hp-bar-fill"></div>
                </div>
                <div class="ki-bar">
                    <div class="bar-label">KI</div>
                    <div class="ki-bar-fill"></div>
                </div>
            </div>
        </div>
        <div class="character-container">
            <img src="https://media.discordapp.net/attachments/1067525557824266400/1073410224842612858/dezdby1-2bffa88d-9bcb-4b23-b28c-b76c29ed9d8a.png?width=572&height=572" alt="Frieza" id="Frieza">
            <div class="frieza-bars">
                <div class="hp-bar">
                    <div class="bar-label">HP</div>
                    <div class="hp-bar-fill"></div>
                </div>
                <div class="ki-bar">
                    <div class="bar-label">KI</div>
                    <div class="ki-bar-fill"></div>
                </div>
            </div>
        </div>
    </div>





</body>
</html>
