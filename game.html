<!DOCTYPE html>
<html>
  <head>

  <div>



      <h1>Power Level: <span id="powerLevel">0</span></h1>
      <button id="trainButton"></button>

                  <button id="spiritBombBtn">Spirit Bomb (1/5)</button>

          </div>
      </div>




      <div id="centerImage"></div>

      <div id="buttons">
          <h2> Transformations!</h2>
          <button id="button1" class="upgradeButton">KaioKen Goku (150 Powerlevel Required)</button>

          <button id="button3" class="upgradeButton">SSJ2 Goku (5,000 Powerlevel Required)</button>
          <button id="button4" class="upgradeButton">SSJ3 Goku (50,000 Powerlevel Required)</button>
          <button id="button5" class="upgradeButton">SSJ4 Goku (500,000 Powerlevel Required)</button>
          <button id="button6" class="upgradeButton">SSG Goku (5,000,000 Powerlevel Required)</button>
          <button id="button7" class="upgradeButton">SSB Goku (50,000,000 Powerlevel Required)</button>
          <button id="button8" class="upgradeButton">SSBKK Goku (500,000,000 Powerlevel Required)</button>
          <button id="button9" class="upgradeButton">UI Goku (5,000,000,000 Powerlevel Required)</button>
          <button id="button10" class="upgradeButton">MUI Goku (50,000,000,000 Powerlevel Required)</button>
      </div>


      <div id="buttons2">
          <h3>Fight Bosses!</h3>
          <button id="button18" onclick="createNewScreen()">Enter Boss Fights</button>
      </div>






      <div id="buttons1">
          <h2>Training Areas!</h2>
          <button id="button11" class="upgradeButton">Kame Island (100 Powerlevel Requried!)</button>
          <button id="button12" class="upgradeButton">Korrin's Tower (10,000 Powerlevel Required!)</button>
          <button id="button13" class="upgradeButton">The Lookout (100,000 Powerlevel Required!)</button>
          <button id="button14" class="upgradeButton">Hyperbolic Time Chamber (1,000,000 Powerlevel Required!)</button>
          <button id="button15" class="upgradeButton">King Kai's Planet (10,000,000 Powerlevel Required!)</button>
          <button id="button16" class="upgradeButton">Beerus' Planet (100,000,000 Powerlevel Required!)</button>

      </div>


      <button id="resetButton"></button>
      <h2> Press Button to Reset</h2>
      <script src="code.js"></script>
      <link rel="stylesheet" type="text/css" href="style.css">
