<!DOCTYPE html>
<html>
  <head>
    <title>Gohar's Website</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background-color: #ADD8E6;
        font-family: Arial, sans-serif;
      }
      h1 {
        text-align: center;
        font-size: 40px;
        color: #00008B;
        text-shadow: 2px 2px #F0FFFF;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .fun-section {
        text-align: center;
        margin-top: 50px;
      }
      .fun-section h2 {
        color: #8B0000;
        margin-bottom: 20px;
      }
      .fun-section p {
        font-size: 20px;
        color: #000000;
      }
      .button {
        background-color: #4CAF50;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 5px;
      }
      .button:hover {
        background-color: #3e8e41;
      }
      .card {
        width: 300px;
        background-color: #f0f0f0;
        border-radius: 5px;
        padding: 20px;
        margin: 20px auto;
        box-shadow: 2px 2px 10px #888888;
      }
      .card img {
        width: 100%;
        border-radius: 5px 5px 0 0;
      }
      .card h3 {
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Gohar's Website</h1>
    </div>

   <div class="fun-section">
      <h2>How to Get Started With Coding</h2>
      <p>Here are some of the best resources to learn with:</p>
      <a href="https://www.w3schools.com/js/" class="button">JavaScript Tutorials</a>
      <a href="https://www.codecademy.com/learn/learn-html" class="button">HTML Tutorials</a>
      <a href="https://www.khanacademy.org/computing/computer-programming" class="button">Programming Tutorials</a>
      <a href="https://www.youtube.com/@BroCodez" class="button">Bro Code</a>
    </div>

  </body>
</html>
