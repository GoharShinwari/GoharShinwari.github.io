<!DOCTYPE html>
<html>
  <head>
    <title>Vegeta Clicker</title>
  </head>
  <div>

      <h1>Power Level: <span id="powerLevel">0</span></h1>
      <button id="trainButton"></button>


      <button id="upgradeBtn">Skill Tree!</button>

      <div id="upgradeModal" class="modal1">
          <div class="modal-content1">
              <span class="close1">&times;</span>
              <h2>Skill Tree!</h2>
              <div id="upgradeButtons1">
                  <button id="kiBlastBtn">Ki Blast (1/5)</button>
                  <button id="galickGunBtn">Galick Gun (1/5)</button>
                  <button id="finalFlashbBtn">Final Flash (1/5)</button>
              </div>
          </div>
      </div>




      <div id="VegetacenterImage"></div>

      <div id="buttons">
          <h2> Transformations!</h2>
          <button id="button1" class="upgradeButton">SSJ Vegeta (10,000 Powerlevel Required)</button>
          <button id="button2" class="upgradeButton">Super Vegeta (100,000 Powerlevel Required)</button>
          <button id="button3" class="upgradeButton">SSJ2 Vegeta (150,000 Powerlevel Required)</button>
          <button id="button4" class="upgradeButton">Majin Vegeta (1,000,000 Powerlevel Required)</button>
          <button id="button5" class="upgradeButton">SSJ4 Vegeta (10,000,000 Powerlevel Required)</button>
          <button id="button6" class="upgradeButton">SSG Vegeta (100,000,000 Powerlevel Required)</button>
          <button id="button7" class="upgradeButton">SSB Vegeta (1,000,000,000 Powerlevel Required)</button>
          <button id="button8" class="upgradeButton">SSBE Vegeta (10,000,000,000) Powerlevel Required)</button>
          <button id="button9" class="upgradeButton">Ultra Ego Vegeta (100,000,000,000 Powerlevel Required)</button>
      </div>


      <div id="buttons2">
          <h3>Vegeta's Battles</h3>
          <button id="button18" onclick="createNewScreen()">Enter Battles</button>
      </div>






      <div id="buttons1">
          <h2>Training Areas!</h2>
          <button id="button11" class="upgradeButton">Kame Island (100 Powerlevel Requried!)</button>
          <button id="button12" class="upgradeButton">Korrin's Tower (10,000 Powerlevel Required!)</button>
          <button id="button13" class="upgradeButton">The Lookout (100,000 Powerlevel Required!)</button>
          <button id="button14" class="upgradeButton">Hyperbolic Time Chamber (1,000,000 Powerlevel Required!)</button>
          <button id="button15" class="upgradeButton">King Kai's Planet (10,000,000 Powerlevel Required!)</button>
          <button id="button16" class="upgradeButton">Beerus' Planet (100,000,000 Powerlevel Required!)</button>
          <button id="button17" class="upgradeButton">Tournament of Power (1,000,000,000 Powerlevel Required!)</button>

      </div>


      <button id="resetButton"></button>
      <h2> Press Button to Reset</h2>
      <script src="VegetaCode.js"></script>
      <link rel="stylesheet" type="text/css" href="VegetaStyle.css">      
      </body>
</html>
