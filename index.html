<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="game.js"></script>
    <title>DBZ Character Select</title>
      <h1>Who would you like to play as?</h1>
      <div id="character-select">
        <button id="goku-button" onclick="selectCharacter('Goku')">
          <img src="https://cdn.discordapp.com/attachments/1069016535542276208/1069020500497547334/latest.png" alt="Goku">
        </button>
        <button id="vegeta-button" onclick="selectCharacter('Vegeta')">
          <img src="https://cdn.discordapp.com/attachments/1069016535542276208/1069020591413264444/latest.png" alt="Vegeta">
        </button>
      </div>
      <div id="selected-character"></div>
    
      <div id="confirmation-button" style="display:none;">
        <p>Are you sure you want to select this character?</p>
        <button id="yes-button" onclick="startGame()">
        <img src="https://cdn.discordapp.com/attachments/1067525557824266400/1069063405895417856/6-66356_clip-art-yes-hd-png-download.png" alt="Yes">
        
        <button id="no-button" onclick="cancelSelection()">
        <img src="https://cdn.discordapp.com/attachments/1067525557824266400/1069063434370564216/217-2172073_no-button-clip-art-no-button-png.png" alt="Goku">

      </div>
      <div id="additional-text" style="display:none;"></div>
      </div> 

    <div>
       <object id="UnityObject" classid="clsid:444785F1-DE89-4295-863A-D46C3A781394"
        width="700" height="750"
        codebase="http://webplayer.unity3d.com/download_webplayer/UnityWebPlayer.cab#version=2,0,0,0">
 <param name="unity3d" value="WebPlayer.unity3d" />
 <embed id="UnityEmbed" src="mlpbeta/mlpbeta.unity3d" width="420" height="750"
  type="application/vnd.unity" pluginspage="http://www.unity3d.com/unity-web-player-2.x" />
 </object>

    </div>

  </body>
</html>
